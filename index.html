<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Material Welcome</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- CSS File -->
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      font-family:'Roboto',sans-serif;
      background:#121318;
      color:#e3e2e6;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col justify-between p-6">

  <!-- HEADER -->
  <header class="mt-8 text-center animate-fade-in">

    <div class="inline-block p-4 bg-indigo-600 rounded-3xl shadow-lg shadow-indigo-500/30 mb-4 transform hover:scale-105 transition-transform duration-300">

      <!-- ICON -->
      <svg class="w-12 h-12 text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24">

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z">
        </path>

      </svg>
    </div>

    <h1 class="text-3xl font-bold tracking-tight text-white mb-2">
      Android VS Code
    </h1>

    <p class="text-gray-400 text-sm">
      Welcome to your portable coding studio
    </p>

  </header>

  <!-- MAIN -->
  <main class="my-auto space-y-4 py-6">

    <!-- CARD 1 -->
    <div
      class="bg-[#1f2026] p-5 rounded-2xl border border-gray-800 shadow-md transform active:scale-95 transition-transform duration-200"
      onclick="showToast('Explorer Loaded')">

      <h2 class="text-indigo-400 font-semibold mb-1 flex items-center gap-2">
        <span>📁</span> Virtual Workspace
      </h2>

      <p class="text-xs text-gray-300">
        Create, edit, and organize index.html, main.js and style.css.
      </p>

    </div>

    <!-- CARD 2 -->
    <div
      class="bg-[#1f2026] p-5 rounded-2xl border border-gray-800 shadow-md transform active:scale-95 transition-transform duration-200"
      onclick="showToast('AI Copilot Ready!')">

      <h2 class="text-purple-400 font-semibold mb-1 flex items-center gap-2">
        <span>🤖</span> Gemini Copilot
      </h2>

      <p class="text-xs text-gray-300">
        AI assistant for coding and debugging.
      </p>

    </div>

    <!-- CARD 3 -->
    <div
      class="bg-[#1f2026] p-5 rounded-2xl border border-gray-800 shadow-md transform active:scale-95 transition-transform duration-200"
      onclick="triggerVibration()">

      <h2 class="text-emerald-400 font-semibold mb-1 flex items-center gap-2">
        <span>⚡</span> Device Emulator
      </h2>

      <p class="text-xs text-gray-300">
        Simulate Android environment dynamically.
      </p>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="mb-4 text-center">

    <button
      id="btn-action"
      class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-2xl shadow-lg transition-all duration-300 transform active:scale-95">

      Click to Simulate Action

    </button>

    <p class="text-[10px] text-gray-500 mt-3 font-mono">
      APPLET VERSION 2.0 • PORT: 3000
    </p>

  </footer>

  <!-- TOAST -->
  <div
    id="toast"
    class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-[#303038] text-white text-xs px-4 py-2 rounded-full shadow-lg opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2">

    <span id="toast-text"></span>

  </div>

  <!-- JavaScript File -->
  <script src="main.js"></script>

</body>
</html>
