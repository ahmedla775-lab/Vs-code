<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">

  <title>Login</title>
</head>

<body class="bg-[#0f1117] text-white flex items-center justify-center min-h-screen">

  <div class="bg-[#1f2026] p-8 rounded-2xl w-full max-w-md">

    <h1 class="text-3xl font-bold mb-6 text-indigo-400">
      Login
    </h1>

    <form class="space-y-4">

      <input
        type="email"
        placeholder="Email"
        class="w-full p-4 rounded-xl bg-[#0f1117] border border-gray-700"
      >

      <input
        type="password"
        placeholder="Password"
        class="w-full p-4 rounded-xl bg-[#0f1117] border border-gray-700"
      >

      <button
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl">
        Sign In
      </button>

    </form>

  </div>

</body>
</html>
