<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">

  <title>Features</title>
</head>

<body class="bg-[#0f1117] text-white p-10">

  <h1 class="text-4xl font-bold mb-8 text-indigo-400">
    Features
  </h1>

  <div class="grid md:grid-cols-3 gap-6">

    <div class="card">
      <h2 class="text-xl font-bold mb-2">💻 Code Editor</h2>
      <p>Write HTML, CSS and JavaScript directly on Android.</p>
    </div>

    <div class="card">
      <h2 class="text-xl font-bold mb-2">🤖 AI Assistant</h2>
      <p>Generate and explain code using AI integration.</p>
    </div>

    <div class="card">
      <h2 class="text-xl font-bold mb-2">⚡ Emulator</h2>
      <p>Run apps inside a mobile emulator environment.</p>
    </div>

  </div>

</body>
</html>
