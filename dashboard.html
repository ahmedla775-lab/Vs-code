<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">

  <title>Dashboard</title>
</head>

<body class="bg-[#0f1117] text-white p-10">

  <h1 class="text-4xl font-bold text-indigo-400 mb-8">
    Dashboard
  </h1>

  <div class="grid md:grid-cols-3 gap-6">

    <div class="card">
      <h2 class="text-xl font-bold">Projects</h2>
      <p>12 Active Projects</p>
    </div>

    <div class="card">
      <h2 class="text-xl font-bold">Storage</h2>
      <p>24GB Used</p>
    </div>

    <div class="card">
      <h2 class="text-xl font-bold">AI Requests</h2>
      <p>128 Requests Today</p>
    </div>

  </div>

  <script src="dashboard.js"></script>

</body>
</html>
