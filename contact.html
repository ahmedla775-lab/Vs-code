<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">

  <title>Contact</title>
</head>

<body class="bg-[#0f1117] text-white p-10">

  <h1 class="text-4xl font-bold mb-6 text-indigo-400">
    Contact
  </h1>

  <form class="max-w-xl space-y-4">

    <input
      type="text"
      placeholder="Your Name"
      class="w-full p-4 rounded-xl bg-[#1f2026] border border-gray-700"
    >

    <input
      type="email"
      placeholder="Email"
      class="w-full p-4 rounded-xl bg-[#1f2026] border border-gray-700"
    >

    <textarea
      placeholder="Message"
      rows="5"
      class="w-full p-4 rounded-xl bg-[#1f2026] border border-gray-700"
    ></textarea>

    <button
      type="submit"
      class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-xl">
      Send Message
    </button>

  </form>

</body>
</html>
